<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zac Regan</title>
    <meta name="description" content="Scaling high-ticket products and services with paid advertising.">
    <meta property="og:title" content="Zac Regan">
    <meta property="og:description" content="Scaling high-ticket products and services with paid advertising.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #FFFFFF;
            color: #111111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .bg-dots {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(0,0,0,0.12) 1.2px, transparent 1.2px);
            background-size: 32px 32px;
        }

        .page {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 28px;
        }

        .logo { margin-bottom: 32px; }
        .logo img { height: 56px; width: auto; }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.035em;
            line-height: 1.1;
            margin-bottom: 12px;
            text-align: center;
        }

        .tagline {
            font-size: 1rem;
            color: #555555;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 360px;
        }

        .links a {
            display: block;
            padding: 16px 24px;
            background: #111111;
            color: #FFFFFF;
            text-align: center;
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 600;
            border-radius: 10px;
            transition: background 0.2s, transform 0.15s;
        }
        .links a:hover {
            background: #333333;
            transform: translateY(-1px);
        }

        .links a.outline {
            background: transparent;
            color: #111111;
            border: 2px solid rgba(0,0,0,0.16);
        }
        .links a.outline:hover {
            border-color: rgba(0,0,0,0.4);
            background: transparent;
        }

        .socials {
            display: flex;
            gap: 24px;
            margin-top: 40px;
        }
        .socials a {
            color: #999999;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .socials a:hover { color: #111111; }

        .footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            font-size: 0.68rem;
            color: #999999;
        }

        @media (max-width: 480px) {
            .page { padding: 40px 20px; }
            h1 { font-size: 1.8rem; }
            .links { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="bg-dots"></div>

<div class="page">
    <div class="logo">
        <img src="logo.png" alt="Zac Regan">
    </div>

    <h1>Zac Regan</h1>
    <p class="tagline">Scaling high-ticket products and services with paid ads.</p>

    <div class="links">
        <a href="https://justscale.co">Scale with paid ads</a>
        <a href="https://vault.justscale.co">Learn how we do it</a>
        <a href="https://www.youtube.com/@zacregan" class="outline">YouTube</a>
        <a href="/blog/" class="outline">Blog</a>
    </div>

    <div class="socials">
        <a href="https://www.youtube.com/@zacregan">YouTube</a>
        <a href="https://www.instagram.com/startrunningads">Instagram</a>
        <a href="https://www.linkedin.com/in/zacregan">LinkedIn</a>
    </div>
</div>

<div class="footer">
    &copy; 2026 Zac Regan. All rights reserved.
</div>

</body>
</html>
