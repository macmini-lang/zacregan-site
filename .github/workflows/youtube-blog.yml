name: Update blog from YouTube

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch: {}     # manual trigger button in Actions tab
  push:
    paths:
      - 'scripts/build-blog.py'
      - '.github/workflows/youtube-blog.yml'

permissions:
  contents: write

concurrency:
  group: youtube-blog
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build blog from YouTube RSS
        run: python3 scripts/build-blog.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/ sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes; blog already up to date."
          else
            git commit -m "Auto-update blog from YouTube RSS"
            git push
          fi
